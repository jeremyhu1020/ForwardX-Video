name: Build Android APK

# 触发条件：推送到 main 分支，或手动触发
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 支持在 GitHub 网页上手动点击构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Java 17
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 安装 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 4. 安装依赖
      - name: Install dependencies
        run: flutter pub get

      # 5. 创建必要资源目录和 Android 图标
      - name: Create placeholder assets and icons
        run: |
          mkdir -p assets/videos assets/thumbnails

          # 创建各尺寸 Android 图标（使用 Python 生成最小合法 PNG）
          python3 - <<'EOF'
import struct, zlib, os

def make_png(size, r, g, b):
    """生成纯色 PNG"""
    def chunk(name, data):
        c = zlib.crc32(name + data) & 0xffffffff
        return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
    
    raw = b''
    for _ in range(size):
        row = b'\x00' + bytes([r, g, b, 255] * size)
        raw += row
    
    compressed = zlib.compress(raw)
    png = b'\x89PNG\r\n\x1a\n'
    png += chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
    png += chunk(b'IDAT', compressed)
    png += chunk(b'IEND', b'')
    return png

icons = {
    'mipmap-mdpi': 48,
    'mipmap-hdpi': 72,
    'mipmap-xhdpi': 96,
    'mipmap-xxhdpi': 144,
    'mipmap-xxxhdpi': 192,
  }

base = 'android/app/src/main/res'
for folder, size in icons.items():
    path = f'{base}/{folder}'
    os.makedirs(path, exist_ok=True)
    with open(f'{path}/ic_launcher.png', 'wb') as f:
        f.write(make_png(size, 26, 115, 232))  # ForwardX 蓝色 #1A73E8
    print(f'Created {path}/ic_launcher.png ({size}x{size})')
EOF

      # 6. 构建 Debug APK（无需签名，可直接安装测试）
      - name: Build debug APK
        run: flutter build apk --debug

      # 7. 同时构建 Release APK（使用 debug 签名，方便测试）
      - name: Build release APK (debug-signed)
        run: flutter build apk --release --no-shrink

      # 8. 上传 APK 到 Artifacts（可在 Actions 页面下载）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ForwardX-Robotics-Videos-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ForwardX-Robotics-Videos-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 9. 如果是 push 事件，自动创建 GitHub Release 并附上 APK
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            ## ForwardX Robotics Videos APK

            自动构建版本，提交：`${{ github.sha }}`

            ### 安装方法
            1. 下载下方的 `app-release.apk`
            2. 在 Android 手机上允许"安装未知来源应用"
            3. 打开 APK 文件安装

            > ⚠️ 此版本为测试签名，仅供内部测试使用
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
